<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMB2DIS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333;
        }
        h1 {
            font-size: 28px;
            font-weight: normal;
            color: #666;
            margin-bottom: 10px;
        }
        .header-line {
            border-top: 1px solid #ddd;
            margin: 15px 0;
        }
        .description {
            color: #666;
            margin-bottom: 20px;
        }
        .form-container {
            background: #f0f0f0;
            padding: 30px 0;
            border-radius: 0;
        }
        .form-row {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
            padding: 0 20px;
        }
        .form-row label {
            width: 140px;
            text-align: right;
            padding-right: 15px;
            padding-top: 8px;
            font-weight: bold;
            color: #333;
        }
        .form-row .input-group {
            flex: 1;
        }
        input[type="file"] {
            display: none;
        }
        .file-input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .file-input-button {
            background: linear-gradient(to bottom, #f0f0f0, #e0e0e0);
            border: 1px solid #999;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 3px;
            width: 50%;
            box-sizing: border-box;
            text-align: center;
        }
        .file-input-button:hover {
            background: linear-gradient(to bottom, #e8e8e8, #d8d8d8);
        }
        .clear-file-button {
            background: #e0e0e0;
            border: 1px solid #999;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 3px;
            display: none;
            font-weight: bold;
            color: #666;
        }
        .clear-file-button:hover {
            background: #d0d0d0;
            color: #333;
        }
        .file-name {
            color: #666;
            font-size: 14px;
        }
        .upload-button {
            background: linear-gradient(to bottom, #f0f0f0, #e0e0e0);
            border: 1px solid #999;
            padding: 6px 16px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 3px;
            margin-top: 8px;
        }
        .upload-button:hover {
            background: linear-gradient(to bottom, #e8e8e8, #d8d8d8);
        }
        .download-link {
            color: #0088a8;
            text-decoration: none;
            font-size: 14px;
            display: block;
            margin-top: 12px;
        }
        .download-link:hover {
            text-decoration: underline;
        }
        select {
            padding: 6px 10px;
            border: 1px solid #ccc;
            font-size: 14px;
            background: white;
        }
        .submit-button {
            background-color: #0088a8;
            color: white;
            border: none;
            padding: 8px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            margin-top: 10px;
        }
        .submit-button:hover {
            background-color: #007a96;
        }
        .sequence-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            box-sizing: border-box;
        }
        #sequence-warning {
            display: none;
            background: #fff3cd;
            color: #856404;
            padding: 10px;
            margin-top: 8px;
            border-left: 4px solid #ffc107;
            font-size: 13px;
        }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .loading-overlay.active {
            display: flex;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f0f0f0;
            border-top: 4px solid #0088a8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 20px;
            font-size: 16px;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>emb2dis</h1>
    <div class="header-line"></div>
    <p class="description">Emb2DIS description ...</p>
    
    <div class="form-container">
        <form id="predictForm" action="/predict" method="POST" enctype="multipart/form-data">
            <div class="form-row">
                <label for="fasta_file">Fasta file:</label>
                <div class="input-group">
                    <div class="file-input-wrapper">
                        <label for="fasta_file" class="file-input-button">Browse...</label>
                        <input type="file" id="fasta_file" name="fasta_file" accept=".fasta,.fa,.faa,.txt">
                        <span class="file-name" id="file-name">No file selected.</span>
                        <button type="button" class="clear-file-button" id="clear_file">X</button>
                    </div>
                    <a href="/download/samples.fasta" class="download-link">Download sample data file</a>
                </div>
            </div>

            <div class="form-row">
                <label for="sequence">Sequence:</label>
                <div class="input-group">
                    <input type="text" id="sequence" name="sequence" class="sequence-input" placeholder="Enter protein sequence">
                    <div id="sequence-warning">
                        The sequence input will be ignored, the FASTA file will be used instead.
                    </div>
                </div>
            </div>

            <div class="form-row">
                <label for="model">Language model:</label>
                <div class="input-group">
                    <select id="model" name="model">
                        <option value="ProtT5" selected>ProtT5</option>
                        <option value="ESM2">ESM2</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <label></label>
                <div class="input-group">
                    <button type="submit" class="submit-button">Submit</button>
                </div>
            </div>
        </form>
    </div>

    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Processing prediction...</div>
    </div>

    <script>
        const sequenceInput = document.getElementById('sequence');
        const fastaInput = document.getElementById('fasta_file');
        const warning = document.getElementById('sequence-warning');
        const fileName = document.getElementById('file-name');
        const clearBtn = document.getElementById('clear_file');

        function checkWarning() {
            if (fastaInput.files.length > 0 && sequenceInput.value.trim() !== '') {
                warning.style.display = 'block';
            } else {
                warning.style.display = 'none';
            }
            
            if (fastaInput.files.length > 0) {
                fileName.textContent = fastaInput.files[0].name;
                clearBtn.style.display = 'inline-block';
            } else {
                fileName.textContent = 'No file selected.';
                clearBtn.style.display = 'none';
            }
        }

        sequenceInput.addEventListener('input', checkWarning);
        fastaInput.addEventListener('change', checkWarning);

        clearBtn.addEventListener('click', function() {
            fastaInput.value = '';
            checkWarning();
        });

        document.getElementById('predictForm').addEventListener('submit', function() {
            document.getElementById('loading-overlay').classList.add('active');
        });
    </script>
</body>
</html>

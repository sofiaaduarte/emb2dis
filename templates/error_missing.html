<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMB2DIS - Error</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333;
        }
        h1 {
            font-size: 28px;
            font-weight: normal;
            color: #666;
            margin-bottom: 10px;
        }
        .header-line {
            border-top: 1px solid #ddd;
            margin: 15px 0;
        }
        .description {
            color: #666;
            margin-bottom: 20px;
        }
        .error-container {
            background: #f0f0f0;
            padding: 30px 0;
        }
        .error-box {
            background: #ffebee;
            color: #c62828;
            padding: 15px 20px;
            border-left: 4px solid #c62828;
            margin: 20px 20px;
        }
        .button-container {
            text-align: center;
            margin-top: 30px;
        }
        .button {
            display: inline-block;
            background-color: #0088a8;
            color: white;
            padding: 10px 24px;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        .button:hover {
            background-color: #007a96;
        }
    </style>
</head>
<body>
    <h1>emb2dis</h1>
    <div class="header-line"></div>
    <p class="description">Emb2DIS description ...</p>
    
    <div class="error-container">
        <div class="error-box">
            <strong>Error:</strong> No sequence provided
        </div>
        <div class="button-container">
            <a href="/" class="button">Go Back</a>
        </div>
    </div>
</body>
</html>
